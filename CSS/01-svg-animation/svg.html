<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Shapes & Animation</title>

    <style> 
    *{
        background-color: beige;
    }
      body {
        font-family: Arial;
        text-align: center;
        background: #f4f4f4;
      }

      svg {
        margin: 20px;
      }
    </style>
  </head>

  <body>
    <h2>SVG Shapes, Gradient and Animation</h2>

    <!-- Gradient Definition -->

    <svg width="0" height="0">
      <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color: #4facfe" />
          <stop offset="100%" style="stop-color: #00f2fe" />
        </linearGradient>
      </defs>
    </svg>

    <!-- Animated Circle -->

    <svg width="120" height="120">
      <circle cx="60" cy="60" r="40" fill="url(#grad1)">
        <animate
          attributeName="r"
          values="30;45;30"
          dur="2s"
          repeatCount="indefinite"
        />
      </circle>
    </svg>

    <!-- Rectangle with Gradient -->

    <svg width="160" height="120">
      <rect x="20" y="20" width="120" height="60" fill="url(#grad1)" />
    </svg>

    <!-- Animated Line -->

    <svg width="200" height="100">
      <line x1="10" y1="50" x2="180" y2="50" stroke="black" stroke-width="4">
        <animate
          attributeName="x2"
          values="10;180;10"
          dur="3s"
          repeatCount="indefinite"
        />
      </line>
    </svg>

    <!-- SVG Text -->

    <svg width="400" height="100">
      <text x="120" y="60" font-size="32" fill="black">Hello SVG</text>
    </svg>

    <!-- Circle with Text -->

    <svg width="200" height="150">
      <circle cx="100" cy="75" r="50" fill="green" />

      <text x="100" y="82" font-size="26" text-anchor="middle" fill="white">
        Hi
      </text>
    </svg>

    <hr />

    <p>SVG Demo: Circle • Line • Gradient • Animation</p>
    <br />
    <br />
    <svg width="100" height="100">
      <circle cx="40" cy="40" r="40" fill="skyblue" />
    </svg>
    <svg width="150" height="150">
      <rect x="20" y="29" width="100" height="50" fill="orange" />
    </svg>
    <svg width="150" height="100">
      <line x1="10" y1="20" x2="40" y2="30" stroke="black" stroke-width="2" />
    </svg>
    <svg width="600" height="150">
      <text x="100" y="50" font-size="24" fill="black">Hello SVG</text>
    </svg>
    <svg width="600" height="150">
      <circle cx="52" cy="75" r="45" fill="green" />
      <text x="52" y="83" font-size="24" text-anchor="middle" fill="white">
        Hi
      </text>
    </svg>
    <br />
    <hr />
    <hr />
    <br />
  </body>
</html>
